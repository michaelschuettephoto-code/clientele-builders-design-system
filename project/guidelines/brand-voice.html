<!-- @dsCard group="Brand" viewport="700x240" name="Voice — the leak reframe" subtitle="Calm, observant, declarative. Short lines. Diagnosis before solution." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 30px; background: var(--surface-card); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .eyebrow { font-family: var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; margin-bottom:12px; display:block; }
  .do .eyebrow { color: var(--healthy); }
  .dont .eyebrow { color: var(--leak); }
  .line { font-family: var(--font-sans); font-size: 16px; line-height: 1.5; color: var(--text-primary); margin: 0 0 7px; }
  .dont .line { color: var(--text-muted); text-decoration: line-through; text-decoration-color: var(--neutral-300); }
</style>
</head>
<body>
<div class="grid">
  <div class="do">
    <span class="eyebrow">We sound like</span>
    <p class="line">Most organizations don't have a lead problem.</p>
    <p class="line">They have a visibility problem.</p>
    <p class="line">We start with diagnosis.</p>
    <p class="line">The goal is not information. The goal is clarity.</p>
  </div>
  <div class="dont">
    <span class="eyebrow">Never</span>
    <p class="line">Unlock explosive growth today!</p>
    <p class="line">The #1 solution for IMOs.</p>
    <p class="line">Revolutionary AI-powered platform.</p>
    <p class="line">Limited spots — act now!</p>
  </div>
</div>
</body>
</html>
