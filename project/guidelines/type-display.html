<!-- @dsCard group="Type" viewport="700x230" name="Display — Newsreader" subtitle="Editorial serif: headlines that carry the thinking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-card); }
  .stack { display:flex; flex-direction:column; gap: 4px; }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing:.1em; text-transform:uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .d1 { font-family: var(--font-display); font-weight: 500; font-size: 56px; line-height: 1.04; letter-spacing:-.03em; color: var(--text-primary); }
  .d2 { font-family: var(--font-display); font-weight: 400; font-size: 31px; line-height: 1.12; letter-spacing:-.02em; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="stack">
  <div class="meta">Newsreader · 500 / 400 · display</div>
  <div class="d1">Find the leaks in your distribution system</div>
  <div class="d2">Most organizations don't have a lead problem.</div>
</div>
</body>
</html>
