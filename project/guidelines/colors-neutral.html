<!-- @dsCard group="Colors" viewport="700x150" name="Neutral ramp" subtitle="Cool slate — surfaces, borders, secondary text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .cell { display:flex; flex-direction:column; gap:6px; }
  .chip { height: 64px; border-radius: 8px; border: 1px solid rgba(11,26,46,.06); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-align:center; }
</style>
</head>
<body>
<div class="ramp">
  <div class="cell"><div class="chip" style="background:var(--neutral-0)"></div><span class="tok">0</span></div>
  <div class="cell"><div class="chip" style="background:var(--neutral-50)"></div><span class="tok">50</span></div>
  <div class="cell"><div class="chip" style="background:var(--neutral-100)"></div><span class="tok">100</span></div>
  <div class="cell"><div class="chip" style="background:var(--neutral-200)"></div><span class="tok">200</span></div>
  <div class="cell"><div class="chip" style="background:var(--neutral-300)"></div><span class="tok">300</span></div>
  <div class="cell"><div class="chip" style="background:var(--neutral-400)"></div><span class="tok">400</span></div>
  <div class="cell"><div class="chip" style="background:var(--neutral-500)"></div><span class="tok">500</span></div>
  <div class="cell"><div class="chip" style="background:var(--neutral-600)"></div><span class="tok">600</span></div>
  <div class="cell"><div class="chip" style="background:var(--neutral-700)"></div><span class="tok">700</span></div>
  <div class="cell"><div class="chip" style="background:var(--neutral-800)"></div><span class="tok">800</span></div>
  <div class="cell"><div class="chip" style="background:var(--neutral-900)"></div><span class="tok">900</span></div>
</div>
</body>
</html>
