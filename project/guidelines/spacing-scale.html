<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="8px base grid — calm, generous rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-card); }
  .row { display:flex; align-items:flex-end; gap:18px; }
  .item { display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
  .bar { background: var(--scan); border-radius: 3px; height: 18px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="width:4px"></div><span class="tok">1·4</span></div>
  <div class="item"><div class="bar" style="width:8px"></div><span class="tok">2·8</span></div>
  <div class="item"><div class="bar" style="width:12px"></div><span class="tok">3·12</span></div>
  <div class="item"><div class="bar" style="width:16px"></div><span class="tok">4·16</span></div>
  <div class="item"><div class="bar" style="width:24px"></div><span class="tok">5·24</span></div>
  <div class="item"><div class="bar" style="width:32px"></div><span class="tok">6·32</span></div>
  <div class="item"><div class="bar" style="width:48px"></div><span class="tok">8·48</span></div>
  <div class="item"><div class="bar" style="width:64px"></div><span class="tok">9·64</span></div>
  <div class="item"><div class="bar" style="width:80px"></div><span class="tok">10·80</span></div>
</div>
</body>
</html>
