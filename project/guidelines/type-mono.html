<!-- @dsCard group="Type" viewport="700x180" name="Labels & data — IBM Plex Mono" subtitle="The instrument readout: eyebrows, tags, metric values" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-card); display:flex; gap:48px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:14px; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color: var(--scan); }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing:.06em; text-transform:uppercase; color:#9A5A12; background:var(--leak-100); padding:4px 10px; border-radius:999px; display:inline-block; width:max-content; }
  .value { font-family: var(--font-mono); font-size: 44px; font-weight:500; letter-spacing:-.01em; color: var(--ink); font-variant-numeric: tabular-nums; }
  .vlabel { font-family: var(--font-mono); font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color: var(--text-muted); }
</style>
</head>
<body>
<div class="col">
  <span class="eyebrow">— The Diagnostic</span>
  <span class="tag">Leak detected</span>
</div>
<div class="col">
  <span class="value">$1.2M</span>
  <span class="vlabel">Annual revenue leak</span>
</div>
</body>
</html>
