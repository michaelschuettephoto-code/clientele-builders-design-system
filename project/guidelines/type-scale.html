<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="From micro mono label to hero display" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-card); }
  .line { display:flex; align-items:baseline; gap:18px; padding:7px 0; border-bottom:1px solid var(--border-subtle); }
  .line:last-child { border-bottom:none; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 132px; flex-shrink:0; }
  .spec { font-family: var(--font-display); color: var(--text-primary); line-height:1.1; letter-spacing:-.02em; white-space:nowrap; }
</style>
</head>
<body>
  <div class="line"><span class="tok">4xl · 68 / display</span><span class="spec" style="font-size:46px">Visibility</span></div>
  <div class="line"><span class="tok">2xl · 40 / display</span><span class="spec" style="font-size:34px">The 8-part diagnostic</span></div>
  <div class="line"><span class="tok">xl · 31 / display</span><span class="spec" style="font-size:27px">Where momentum breaks</span></div>
  <div class="line"><span class="tok">md · 19 / sans</span><span class="spec" style="font-size:19px;font-family:var(--font-sans)">Lead paragraph copy</span></div>
  <div class="line"><span class="tok">base · 17 / sans</span><span class="spec" style="font-size:17px;font-family:var(--font-sans);font-weight:400">Body text, comfortable reading</span></div>
  <div class="line"><span class="tok">2xs · 12 / mono</span><span class="spec" style="font-size:12px;font-family:var(--font-mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted)">Instrument label</span></div>
</body>
</html>
