<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; display:block; }
  .bars { display: flex; flex-direction: column; gap: 18px; }
  .metrics { display: flex; gap: 28px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { HealthBar, Metric, Card } = window.ClienteleBuildersDesignSystem_6b1cb1;
  function Demo() {
    return (
      <div className="grid">
        <div>
          <span className="lbl">HealthBar — leak meter</span>
          <div className="bars">
            <HealthBar label="Recruiting" value={28} statusText="Significant leak" />
            <HealthBar label="Onboarding" value={41} />
            <HealthBar label="Sales Process" value={64} />
            <HealthBar label="Persistency" value={83} statusText="Healthy" />
          </div>
        </div>
        <div>
          <span className="lbl">Metric — readouts</span>
          <div className="metrics" style={{ marginBottom: 22 }}>
            <Metric value="$1.2M" label="Annual leak" tone="leak" />
            <Metric value="37%" label="Activation rate" />
            <Metric value="4.1×" label="Recruiting ROI" tone="healthy" />
          </div>
          <Card variant="ink" padding="lg">
            <Metric value="+$640K" label="Recoverable / yr" tone="onDark"
              context="If activation improves from 37% to 50%." />
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>

</html>
